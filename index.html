<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kairos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- Sidebar: Contacts -->
    <div class="sidebar">
      <h2>Kairos</h2>
      <ul>
        <li>User A</li>
        <li>User B</li>
        <li>User C</li>
        <li>User D</li>
      </ul>
    </div>


    <!-- Chat Window -->
    <div class="chat">
      <div class="chat-header">Chat with User B</div>
      <div class="messages" id="messages">
        <div class="message sender">User A: Hello!</div>
        <div class="message receiver">User B: Hi :)</div>
      </div>
      <div class="input-area">
        <input type="text" id="msgInput" placeholder="Type a message...">
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
