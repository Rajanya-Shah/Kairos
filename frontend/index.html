<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kairos — Speak in the Right Moment</title>
    <meta name="description" content="Kairos — a luxury, mysterious and editorial-styled private messaging platform." />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,500&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ═══════════════════════════════════════════════════════════
       VIEW: AUTH  (Login / Register)
  ═══════════════════════════════════════════════════════════ -->
    <section id="view-auth" class="view active">
        <div class="auth-backdrop">
            <div class="auth-grain"></div>
        </div>

        <div class="auth-container">
            <!-- Wordmark -->
            <div class="auth-wordmark">
                <h1 class="wordmark-title">Kairos</h1>
                <p class="wordmark-tagline">Speak in the right moment.</p>
            </div>

            <!-- Tab Bar -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</button>
                <button class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="form-login" class="auth-form" autocomplete="off" onsubmit="handleLogin(event)">
                <div class="field-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" placeholder="your_handle" required />
                </div>
                <div class="field-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required />
                </div>
                <div id="auth-error" class="auth-error hidden"></div>
                <button type="submit" class="btn-primary" id="btn-login">
                    <span class="btn-text">Enter</span>
                    <span class="btn-shimmer"></span>
                </button>
            </form>

            <!-- Register Form -->
            <form id="form-register" class="auth-form hidden" autocomplete="off" onsubmit="handleRegister(event)">
                <div class="field-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" placeholder="your_handle" required minlength="3"
                        maxlength="50" />
                </div>
                <div class="field-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" placeholder="••••••••" required minlength="6" />
                </div>
                <div id="reg-error" class="auth-error hidden"></div>
                <button type="submit" class="btn-primary" id="btn-register">
                    <span class="btn-text">Create Account</span>
                    <span class="btn-shimmer"></span>
                </button>
            </form>
        </div>
    </section>

    <!-- ═══════════════════════════════════════════════════════════
       VIEW: INBOX / MAIN APP SHELL
  ═══════════════════════════════════════════════════════════ -->
    <section id="view-app" class="view hidden">
        <div class="app-shell">

            <!-- ── Sidebar ─────────────────────────────────── -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div class="sidebar-brand">
                        <span class="sidebar-wordmark">Kairos</span>
                    </div>
                    <div class="sidebar-actions">
                        <button class="icon-btn" id="btn-open-add-friend" title="Add Contact" onclick="openAddFriend()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
                                <circle cx="9" cy="7" r="4" />
                                <line x1="19" y1="8" x2="19" y2="14" />
                                <line x1="22" y1="11" x2="16" y2="11" />
                            </svg>
                        </button>
                        <button class="icon-btn" id="btn-open-settings" title="Settings" onclick="openSettings()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                                stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="8" r="4" />
                                <path d="M6 20v-2a6 6 0 0 1 12 0v2" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Contacts list -->
                <div class="contacts-search-wrap">
                    <input type="text" id="sidebar-search" placeholder="Search conversations…"
                        oninput="filterContacts(this.value)" />
                </div>
                <ul class="contacts-list" id="contacts-list">
                    <li class="contacts-placeholder">No contacts yet. Add someone.</li>
                </ul>
            </aside>

            <!-- ── Chat Panel ───────────────────────────────── -->
            <main class="chat-panel" id="chat-panel">

                <!-- Inbox View (Replaces Empty State) -->
                <div class="inbox-view" id="inbox-view">
                    <div class="inbox-header">
                        <h2 class="inbox-title">Conversations</h2>
                        <p class="inbox-subtitle">Your private luxury space.</p>
                    </div>
                    <div class="inbox-list" id="inbox-list">
                        <!-- Rendered by JS -->
                    </div>
                </div>

                <!-- Active Chat -->
                <div class="chat-active hidden" id="chat-active">

                    <!-- Chat Header -->
                    <div class="chat-header">
                        <div class="chat-header-avatar" id="chat-header-avatar"></div>
                        <div class="chat-header-info">
                            <span class="chat-header-name" id="chat-header-name"></span>
                            <span class="chat-header-status" id="chat-header-status">online</span>
                        </div>
                        <div class="chat-header-actions">
                            <select id="chat-theme-select" class="theme-select" onchange="changeChatTheme(this.value)"
                                title="Personalize Chat Theme">
                                <option value="default">Midnight (Default)</option>
                                <option value="amethyst">Amethyst</option>
                                <option value="emerald">Emerald</option>
                                <option value="obsidian">Obsidian</option>
                                <option value="gold">Gold</option>
                                <option value="crimson">Crimson</option>
                            </select>
                        </div>
                    </div>

                    <!-- Messages -->
                    <div class="messages-container" id="messages-container">
                        <!-- Messages rendered here by JS -->
                    </div>

                    <!-- Typing indicator -->
                    <div class="typing-indicator hidden" id="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>

                    <!-- Input area -->
                    <div class="chat-input-area">
                        <!-- Image Attachment Button -->
                        <button class="icon-btn btn-attach" id="btn-attach"
                            onclick="document.getElementById('image-upload-input').click()" title="Share Image">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                                <circle cx="8.5" cy="8.5" r="1.5" />
                                <polyline points="21 15 16 10 5 21" />
                            </svg>
                        </button>
                        <input type="file" id="image-upload-input" accept="image/*" class="hidden"
                            onchange="handleImageAttach(event)" />

                        <div id="image-preview-container" class="image-preview-container hidden">
                            <img id="image-preview-img" src="" alt="Preview" />
                            <button class="btn-remove-image" onclick="removeImageAttach()">✕</button>
                        </div>

                        <!-- Whisper Mode -->
                        <button class="btn-whisper" id="btn-whisper" onclick="toggleWhisper()"
                            title="Whisper Mode (Blurred Text)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                <circle cx="12" cy="12" r="3" />
                                <line x1="3" y1="3" x2="21" y2="21" class="strike-line hidden" />
                            </svg>
                        </button>

                        <!-- Burn Mode toggle -->
                        <button class="btn-burn" id="btn-burn" onclick="toggleBurnMode()"
                            title="Burn Mode (Message destroys in 10s)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <path
                                    d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z" />
                            </svg>
                        </button>

                        <textarea id="message-input" class="message-input" placeholder="Write something…" rows="1"
                            onkeydown="handleInputKeydown(event)"
                            oninput="autoResizeTextarea(this); handleTyping();"></textarea>

                        <button class="btn-send" id="btn-send" onclick="sendMessage()" title="Send">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <line x1="22" y1="2" x2="11" y2="13" />
                                <polygon points="22 2 15 22 11 13 2 9 22 2" />
                            </svg>
                        </button>
                    </div>

                </div><!-- /#chat-active -->
            </main><!-- /.chat-panel -->

        </div><!-- /.app-shell -->
    </section><!-- /#view-app -->

    <!-- ═══════════════════════════════════════════════════════════
       MODAL: ADD FRIEND
  ═══════════════════════════════════════════════════════════ -->
    <div id="modal-add-friend" class="modal-overlay hidden" onclick="closeAddFriendOnBg(event)">
        <div class="modal-card" id="modal-add-friend-card">
            <div class="modal-header">
                <h2 class="modal-title">Add Contact</h2>
                <button class="modal-close" onclick="closeAddFriend()">✕</button>
            </div>

            <!-- Search -->
            <div class="modal-section">
                <div class="field-group">
                    <label for="friend-search-input">Search by username</label>
                    <div class="friend-search-row">
                        <input type="text" id="friend-search-input" placeholder="username…"
                            oninput="searchUsers(this.value)" />
                    </div>
                </div>
                <ul class="search-results" id="friend-search-results"></ul>
            </div>

            <!-- Pending requests -->
            <div class="modal-section">
                <h3 class="modal-sub-title">Pending Requests</h3>
                <ul class="pending-list" id="pending-list">
                    <li class="pending-placeholder">No pending requests.</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════
       PANEL: SETTINGS
  ═══════════════════════════════════════════════════════════ -->
    <div id="panel-settings" class="panel-overlay hidden" onclick="closeSettingsOnBg(event)">
        <div class="panel-card" id="panel-settings-card">
            <div class="panel-header">
                <h2 class="panel-title">Profile</h2>
                <button class="modal-close" onclick="closeSettings()">✕</button>
            </div>
            <div class="panel-avatar-wrap" onclick="document.getElementById('avatar-upload-input').click()"
                title="Click to change avatar">
                <div class="panel-avatar" id="panel-avatar-display"></div>
                <div class="avatar-upload-overlay">
                    <span>Edit</span>
                </div>
            </div>
            <input type="file" id="avatar-upload-input" class="hidden" accept="image/*"
                onchange="uploadAvatar(event)" />
            <div class="panel-username-wrap">
                <p class="panel-username" id="panel-username-display"></p>
            </div>
            <div class="panel-actions">
                <button class="btn-secondary" onclick="handleLogout()">Sign Out</button>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════
       LIGHTBOX UI
  ═══════════════════════════════════════════════════════════ -->
    <div id="lightbox-overlay" class="lightbox-overlay hidden" onclick="closeLightbox(event)">
        <button class="lightbox-close" onclick="closeLightbox(event)">✕</button>
        <img id="lightbox-img" class="lightbox-img" src="" alt="Full Screen Image" />
    </div>

    <script src="script.js"></script>
</body>

</html>
